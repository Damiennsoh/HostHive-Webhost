# Traefik Configuration for HostHive
# Dynamic reverse proxy with automatic SSL/TLS and Docker integration

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true

# Entry points
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entrypoint:
          regex: '^http://(.*)$'
          replacement: 'https://${1}'
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "*.hosthive.app"
            sans:
              - "hosthive.app"

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: hosthive-network

  file:
    filename: /traefik.yml
    watch: true

# ACME (Let's Encrypt) Configuration
certificatesResolvers:
  letsencrypt:
    acme:
      email: ${LETS_ENCRYPT_EMAIL}
      storage: acme.json
      httpChallenge:
        entryPoint: web
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

# Logging
log:
  level: INFO
  format: common

accessLog:
  format: common
